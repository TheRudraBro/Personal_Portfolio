
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects Section</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    :root {
      --accent: #d4ff3a;
      --surface: #111;
    }

    body {
      background: #0a0a0a;
      color: white;
      font-family: sans-serif;
    }

    .project-card {
      transition: all 0.4s ease;
    }

    .project-card:hover {
      transform: translateY(-8px);
    }
  </style>
</head>

<body>

<section class="px-6 md:px-12 py-20 max-w-6xl mx-auto">

  <!-- Title -->
  <div class="mb-12">
    <h2 class="text-4xl font-light">Things I've built</h2>
  </div>

  <!-- Filter -->
  <div class="flex gap-3 mb-10 text-sm">
    <button id="filter-all" class="filter-btn px-4 py-2 border border-gray-600 rounded-full">All</button>
    <button id="filter-website" class="filter-btn px-4 py-2 border border-gray-600 rounded-full">Website</button>
    <button id="filter-app" class="filter-btn px-4 py-2 border border-gray-600 rounded-full">App</button>
  </div>

  <!-- Projects -->
  <div id="projects-grid" class="grid md:grid-cols-2 gap-6"></div>

</section>

<script>
const projects = [
  {
    title: "Tourism Bangladesh",
    desc: "Tourism platform with booking system.",
    tags: ["JavaScript", "Firebase"],
    url: "https://tourism-bangladesh.netlify.app/",
    github: "https://github.com/",
    image: "https://images.unsplash.com/photo-1452587925148-ce544e77e70d?w=1200",
    type: "website"
  },
  {
    title: "English Janala",
    desc: "Vocabulary learning platform.",
    tags: ["HTML", "Tailwind"],
    url: "https://english-vocabularies-learning-janala.netlify.app/",
    github: "https://github.com/",
    image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200",
    type: "website"
  },
  {
    title: "Expense Tracker App",
    desc: "Track your daily expenses.",
    tags: ["React Native"],
    url: "#",
    github: "https://github.com/",
    image: "https://images.unsplash.com/photo-1584433144859-1fc3ab64a957?w=1200",
    type: "app"
  }
];

let activeFilter = "all";

function renderProjects() {
  const grid = document.getElementById("projects-grid");

  let filtered = projects.filter(p => {
    if (activeFilter === "all") return true;
    return p.type === activeFilter;
  });

  grid.innerHTML = filtered.map(p => `
    <div class="project-card bg-[var(--surface)] rounded-xl overflow-hidden">

      <img src="${p.image}" class="w-full h-56 object-cover">

      <div class="p-6">

        <h3 class="text-2xl mb-2">${p.title}</h3>

        <p class="text-gray-400 text-sm mb-4">${p.desc}</p>

        <div class="flex flex-wrap gap-2 mb-4">
          ${p.tags.map(t => `
            <span class="text-xs border px-2 py-1 rounded">${t}</span>
          `).join("")}
        </div>

        <div class="flex gap-3">

          <a href="${p.url}" target="_blank"
            class="flex-1 text-center text-xs px-3 py-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] transition">
            🔗 Live
          </a>

          <a href="${p.github}" target="_blank"
            class="flex-1 text-center text-xs px-3 py-2 border rounded hover:border-[var(--accent)] hover:text-[var(--accent)] transition">
            🧠 Code
          </a>

        </div>

      </div>
    </div>
  `).join("");

  lucide.createIcons();
}

document.getElementById("filter-all").onclick = () => {
  activeFilter = "all";
  renderProjects();
};

document.getElementById("filter-website").onclick = () => {
  activeFilter = "website";
  renderProjects();
};

document.getElementById("filter-app").onclick = () => {
  activeFilter = "app";
  renderProjects();
};

renderProjects();
</script>

</body>
</html>
